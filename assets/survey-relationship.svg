<svg xmlns="http://www.w3.org/2000/svg" width="840" height="1050" viewBox="0 0 840 1050">
  <rect width="840" height="1050" fill="#15120e"/>
  <text x="58" y="58" fill="#fff" font-size="52" font-family="Arial, sans-serif">‹</text>
  <text x="780" y="58" fill="#fff" font-size="52" font-family="Arial, sans-serif">×</text>
  <circle cx="360" cy="48" r="28" fill="#132133"/>
  <text x="360" y="61" fill="#6aa2ff" text-anchor="middle" font-size="30" font-weight="800" font-family="Arial, sans-serif">王</text>
  <text x="396" y="62" fill="#fff" font-size="34" font-weight="800" font-family="Arial, sans-serif">이서연</text>
  <rect x="498" y="28" width="55" height="42" rx="10" fill="#211b33"/>
  <text x="526" y="56" fill="#7f63ff" text-anchor="middle" font-size="18" font-weight="800" font-family="Arial, sans-serif">클론</text>
  <rect x="6" y="100" width="828" height="78" fill="#442611"/>
  <text x="40" y="150" fill="#ff831a" font-size="25" font-weight="800" font-family="Arial, sans-serif">대화 시뮬레이션 · 이서연의 클론과 대화 중</text>
  <circle cx="64" cy="270" r="30" fill="#132133"/>
  <text x="64" y="284" fill="#6aa2ff" text-anchor="middle" font-size="31" font-family="Arial, sans-serif">王</text>
  <rect x="110" y="214" width="338" height="82" rx="28" fill="#17140f" stroke="#332d24" stroke-width="2"/>
  <text x="140" y="266" fill="#fff" font-size="28" font-family="Arial, sans-serif">아라야, 오늘 하루 어땠어?</text>
  <rect x="240" y="318" width="600" height="82" rx="28" fill="#ff831a"/>
  <text x="270" y="370" fill="#fff" font-size="28" font-family="Arial, sans-serif">그냥 그랬어... 요즘 우리 사이 좀 애매한 것 같아서.</text>
  <circle cx="64" cy="506" r="30" fill="#132133"/>
  <text x="64" y="520" fill="#6aa2ff" text-anchor="middle" font-size="31" font-family="Arial, sans-serif">王</text>
  <rect x="110" y="418" width="582" height="122" rx="28" fill="#17140f" stroke="#332d24" stroke-width="2"/>
  <text x="140" y="472" fill="#fff" font-size="28" font-family="Arial, sans-serif">무슨 일 있었어? 말 안 해도 돼,</text>
  <text x="140" y="512" fill="#fff" font-size="28" font-family="Arial, sans-serif">근데 저녁은 먹었어?</text>
  <rect x="240" y="562" width="600" height="82" rx="28" fill="#ff831a"/>
  <text x="270" y="614" fill="#fff" font-size="28" font-family="Arial, sans-serif">(또 위로 대신 밥 얘기네...)</text>
  <circle cx="64" cy="760" r="30" fill="#132133"/>
  <text x="64" y="774" fill="#6aa2ff" text-anchor="middle" font-size="31" font-family="Arial, sans-serif">王</text>
  <rect x="110" y="664" width="582" height="126" rx="28" fill="#17140f" stroke="#332d24" stroke-width="2"/>
  <text x="140" y="720" fill="#fff" font-size="28" font-family="Arial, sans-serif">사실 너 요즘 힘들어 보여서</text>
  <text x="140" y="760" fill="#fff" font-size="28" font-family="Arial, sans-serif">계속 신경 쓰였어.</text>
</svg>
