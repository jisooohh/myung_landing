<body>
<div id="sky"></div>

<main class="thanks-shell">
  <a class="thanks-brand" href="index.html" aria-label="myung.ai 홈">
    <span class="my">my</span><span>ung.ai</span>
  </a>

  <section class="thanks-card">
    <span class="thanks-kicker">PRE-LAUNCH RESERVED</span>
    <h1>베타 버전 출시 후<br>가장 먼저 알려드리겠습니다.</h1>
    <p>남겨주신 이메일로 무료 베타 릴리즈 소식을 보내드릴게요.</p>

    <div class="thanks-survey">
      <p>내가 만드는 myung.ai. 의견 보내기</p>
      <a id="thanks-survey-link" href="survey.html">설문 참여하기</a>
    </div>
  </section>
</main>

<script>
  (function () {
    try {
      var email = new URLSearchParams(window.location.search).get('email') || '';
      if (!email) {
        var list = JSON.parse(localStorage.getItem('myung_waitlist') || '[]');
        var last = list[list.length - 1];
        email = last && last.email ? last.email : '';
      }
      var link = document.getElementById('thanks-survey-link');
      if (email && link) link.href = 'survey.html?email=' + encodeURIComponent(email);
      if (window.gtag) window.gtag('event', 'waitlist_thanks_view');
    } catch (_) {}
  })();
</script>
